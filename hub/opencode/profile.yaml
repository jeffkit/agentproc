name: opencode
description: Connect the opencode CLI as an AgentProc agent with streaming and session continuity
cli: opencode
cli_install: |
  npm install -g opencode-ai
  # or: curl -fsSL https://opencode.ai/install | bash
agentproc:
  executor: opencode
  command: python3
  args: ["{{PROFILE_DIR}}/bridge.py"]
  # cwd is intentionally left unset. `agentproc hub run` defaults it to your
  # current directory (so `opencode` runs against your project); you can also
  # pass --cwd explicitly.
  timeout_secs: 600
  streaming: true
  env:
    OPENCODE_MODEL: "${OPENCODE_MODEL}"
    # API keys are read by opencode from its own auth store (opencode auth login)
    # or from standard env vars. Uncomment the ones you need:
    # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    # OPENAI_API_KEY: "${OPENAI_API_KEY}"
  env_allowlist: [OPENCODE_MODEL, ANTHROPIC_API_KEY, OPENAI_API_KEY]
tested: community
maintainer: jeffkit
tags: [coding, ai, open-source]
notes: |
  Uses `opencode run <message> --auto --format json` for non-interactive mode.
  The `--auto` flag auto-approves all non-denied permissions. The `--format json`
  flag emits NDJSON events that this bridge parses for text and session IDs.

  Session IDs (format `ses_XXX`) are captured from the `sessionID` field present
  in every JSON event and stamped as session_id on AgentProc events. The next turn replays the
  id as `--session <id>`, enabling native multi-turn continuity.

  Requires opencode v1.16.3+ for reliable `--format json` output. Older versions
  had a race condition (earendil-works/opencode#31365) where the process exited
  before all text events were flushed to stdout. Upgrade with `opencode upgrade`.
