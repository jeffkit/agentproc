name: echo-agent
description: Minimal AgentProc hello-world agent — echoes the user message back, for testing bridge integrations
cli: none
cli_install: |
  # No CLI to install — this is a reference implementation.
agentproc:
  command: python3
  args: ["{{PROFILE_DIR}}/bridge.py"]
  # cwd defaults to your current directory under `agentproc hub run`;
  # echo-agent doesn't touch the filesystem, so any cwd works.
  timeout_secs: 10
  streaming: false
tested: official
maintainer: jeffkit
tags: [example, reference]
notes: |
  The echo-agent is the smallest valid AgentProc agent (wire 0.4). It reads the
  {"type":"turn",...} object from stdin and writes the message back to stdout
  as a {"type":"result"} event prefixed with "You said: ". Use it to verify your
  messaging bridge speaks the protocol correctly before plugging in a real AI CLI.
