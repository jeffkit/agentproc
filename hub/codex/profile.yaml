name: codex
description: Connect the codex CLI (OpenAI Codex) as an AgentProc agent with streaming and session continuity
cli: codex
cli_install: |
  npm install -g @openai/codex
agentproc:
  command: python3 {{PROFILE_DIR}}/bridge.py
  # cwd defaults to your current directory under `agentproc hub run`.
  # Override with --cwd if you want codex to run elsewhere.
  timeout_secs: 600
  streaming: true
  # Opt-in mid-turn tool authorization (wire 0.2). Uses a one-shot CODEX_HOME
  # PermissionRequest hook that relays ↔ AGENT_PERMISSION_*. Default false
  # keeps the existing policy / sandbox behaviour (no bypass flag).
  # permission: true
  env:
    OPENAI_API_KEY: "${OPENAI_API_KEY}"
    # Optional override (uncomment to use):
    # CODEX_MODEL: "gpt-5"                # model name; sets -c model="..." on first turn
  env_allowlist: [OPENAI_API_KEY, CODEX_MODEL]
tested: official
maintainer: jeffkit
tags: [coding, openai, ai]
notes: |
  Uses `codex exec --json` and parses the NDJSON event stream:
    - thread.started → captures thread_id as the session id
    - item.completed (agent_message) → emits AGENT_PARTIAL: with the text
    - turn.completed → end of turn

  Session continuity uses `codex exec resume --json <thread_id> <prompt>` on
  subsequent turns. `--json` MUST be present on both first-turn and resume paths;
  without it codex emits non-NDJSON output that the bridge cannot parse.

  With `permission: true`, the bridge injects a temporary CODEX_HOME with a
  PermissionRequest hook (`permission_hook.py`) that talks to the bridge over a
  Unix socket, and sets `approval_policy=on-request` so approvals actually fire.
