name: Publish SDKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

jobs:
  verify-versions:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify package/protocol versions are in sync and match the tag
        id: check
        run: |
          python3 - <<'PY'
          import json, os, re, sys
          node_pkg = json.load(open("sdk/node/package.json"))["version"]
          py_pkg = re.search(r'^version\s*=\s*"([^"]+)"',
                             open("sdk/python/pyproject.toml").read(),
                             re.M).group(1)
          LITERAL = re.compile(r"PROTOCOL_VERSION\s*=\s*['\"]([^'\"]+)['\"]")
          def lit(p):
              m = LITERAL.search(open(p).read())
              return m.group(1) if m else None
          node_pv = lit("sdk/node/src/runner.js")
          py_pv = lit("sdk/python/src/agentproc/runner.py")
          index_lit = LITERAL.search(open("sdk/node/src/index.js").read())
          init_lit = LITERAL.search(open("sdk/python/src/agentproc/__init__.py").read())

          ref = os.environ.get("GITHUB_REF_NAME", "")
          dispatch = os.environ.get("DISPATCH_VERSION", "")
          expected = ref[1:] if ref.startswith("v") else dispatch

          errors = []
          if node_pkg != py_pkg:
              errors.append(f"package version mismatch: node {node_pkg} != python {py_pkg}")
          if node_pv != py_pv:
              errors.append(f"PROTOCOL_VERSION mismatch: runner.js {node_pv!r} != runner.py {py_pv!r}")
          if index_lit:
              errors.append("index.js must import PROTOCOL_VERSION from runner.js, not re-declare it")
          if init_lit:
              errors.append("__init__.py must import PROTOCOL_VERSION from runner.py, not re-declare it")
          if expected and expected not in (node_pkg, py_pkg):
              errors.append(f"tag/dispatch version {expected!r} != package versions (node {node_pkg}, py {py_pkg})")
          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={node_pkg}\n")
          print(f"versions in sync: pkg={node_pkg} protocol={node_pv} expected={expected!r}")
          PY
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}

  test-node:
    needs: verify-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sdk/node/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: sdk/node
      - run: node --test src/index.test.js src/runner.test.js src/hub.test.js src/conformance.test.js src/scenarios.test.js src/sdk.test.js src/diagnostics.test.js src/hub_bridge_conformance.test.js
        working-directory: sdk/node

  test-python:
    needs: verify-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest pyyaml
      - run: pytest -q tests/
        working-directory: sdk/python
        env:
          PYTHONPATH: src

  publish-npm:
    needs: [test-node, test-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Publish agentproc to npm
        run: npm publish --access public
        working-directory: sdk/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    needs: [test-node, test-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Bundle hub profiles into the package
        run: python scripts/prepare_hub.py
        working-directory: sdk/python

      - name: Build package
        run: python -m build
        working-directory: sdk/python

      - name: Publish agentproc to PyPI
        run: twine upload dist/*
        working-directory: sdk/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
