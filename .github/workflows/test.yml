name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
      - 'hub/**'
      - 'spec/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/**'
      - 'hub/**'
      - 'spec/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  test-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdk/node/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: sdk/node
      - name: Run Node SDK tests
        run: node --test src/index.test.js src/runner.test.js src/hub.test.js src/conformance.test.js src/scenarios.test.js src/sdk.test.js src/diagnostics.test.js src/hub_bridge_conformance.test.js
        working-directory: sdk/node

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: pip install pytest pyyaml
      - name: Run Python SDK tests
        run: pytest -q tests/
        working-directory: sdk/python
        env:
          PYTHONPATH: src

  # Single source of truth: spec/conformance/cases.json drives BOTH SDKs.
  # This job runs both conformance suites in one place so a divergence
  # (someone edits cases.json or one classify_line but not the other) shows
  # up as a dedicated red light, not buried inside the per-SDK matrices.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/node/package-lock.json
      - name: Install Node dependencies
        run: npm ci
        working-directory: sdk/node
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest pyyaml
      - name: Node conformance
        run: node --test src/conformance.test.js src/scenarios.test.js src/sdk.test.js src/diagnostics.test.js src/hub_bridge_conformance.test.js
        working-directory: sdk/node
      - name: Python conformance
        run: pytest -q tests/test_conformance.py tests/test_scenarios.py tests/test_sdk.py tests/test_diagnostics.py tests/test_hub_bridge_conformance.py
        working-directory: sdk/python
        env:
          PYTHONPATH: src

  # Enforce the "single source of truth" invariants that are easy to break
  # by hand: package versions on npm/PyPI must match, PROTOCOL_VERSION must
  # be defined exactly once per SDK (in runner.* ) and not copy-pasted into
  # the SDK entry points.
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify versions and protocol constants are in sync
        run: |
          python3 - <<'PY'
          import json, re, sys
          node_pkg = json.load(open("sdk/node/package.json"))["version"]
          py_pkg = re.search(r'^version\s*=\s*"([^"]+)"',
                             open("sdk/python/pyproject.toml").read(),
                             re.M).group(1)
          LITERAL = re.compile(r"PROTOCOL_VERSION\s*=\s*['\"]([^'\"]+)['\"]")

          def lit(path):
              m = LITERAL.search(open(path).read())
              return m.group(1) if m else None

          # runner.* hold the single literal definition each.
          node_pv = lit("sdk/node/src/runner.js")
          py_pv = lit("sdk/python/src/agentproc/runner.py")
          # Entry points must NOT re-declare the literal (they must import it).
          index_lit = LITERAL.search(open("sdk/node/src/index.js").read())
          init_lit = LITERAL.search(open("sdk/python/src/agentproc/__init__.py").read())

          errors = []
          if node_pkg != py_pkg:
              errors.append(f"package version mismatch: node {node_pkg} != python {py_pkg}")
          if node_pv != py_pv:
              errors.append(f"PROTOCOL_VERSION mismatch: runner.js {node_pv!r} != runner.py {py_pv!r}")
          if index_lit:
              errors.append("index.js must import PROTOCOL_VERSION from runner.js, not re-declare it")
          if init_lit:
              errors.append("__init__.py must import PROTOCOL_VERSION from runner.py, not re-declare it")
          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)
          print(f"versions in sync: pkg={node_pkg} protocol={node_pv}")
          PY

  # Verify the hub-bundling scripts faithfully reproduce canonical hub/ and
  # that the bundled copy is non-empty. Catches drift between hub/ and what
  # npm/PyPI users actually receive.
  hub-bundle-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Regenerate bundled hub copies
        run: |
          node sdk/node/scripts/prepare-hub.js
          python sdk/python/scripts/prepare_hub.py
      - name: Bundled copies must match canonical hub/
        run: |
          set -e
          fail=0
          diff -r --exclude=__pycache__ --exclude='*.pyc' hub/ sdk/node/hub/ || fail=1
          diff -r --exclude=__pycache__ --exclude='*.pyc' hub/ sdk/python/src/agentproc/hub_data/ || fail=1
          if [ "$fail" = "1" ]; then
            echo "::error::bundled hub copy drifts from canonical hub/ — run the prepare scripts"
            exit 1
          fi
      - name: Bundled copy must be non-empty
        run: |
          count=$(find sdk/python/src/agentproc/hub_data -name profile.yaml | wc -l | tr -d ' ')
          if [ "$count" -lt 1 ]; then
            echo "::error::bundled hub_data has no profiles — prepare script failed silently"
            exit 1
          fi
          echo "bundled profiles: $count"
      - name: Bundles must ship in the publish artifacts
        run: |
          set -e
          # Node: `npm pack` honors "files": ["src","hub"] + runs prepublishOnly.
          # Confirm the tarball would actually carry hub/ profiles.
          node_out=$(cd sdk/node && npm pack --dry-run 2>&1)
          echo "$node_out" | grep -E 'hub/.*profile\.yaml' >/dev/null || {
            echo "::error::npm tarball does not include hub/ profiles — check package.json \"files\""
            exit 1
          }
          echo "ok: npm tarball includes hub/"
          # Python: build the sdist and confirm hub_data/ is inside.
          pip install -q build
          (cd sdk/python && python -m build --sdist >/dev/null)
          sdist=$(ls sdk/python/dist/*.tar.gz | head -1)
          tar -tzf "$sdist" | grep -E 'hub_data/.*profile\.yaml' >/dev/null || {
            echo "::error::PyPI sdist does not include hub_data/ — check pyproject package-data + run prepare_hub.py before build"
            exit 1
          }
          echo "ok: PyPI sdist includes hub_data/"

  test-hub-bridges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax-check all hub bridge scripts
        run: |
          set -e
          fail=0
          for f in hub/*/bridge.py; do
            if ! python3 -m py_compile "$f"; then
              echo "::error file=$f::Python syntax check failed"
              fail=1
            fi
          done
          for f in hub/*/bridge.js; do
            if ! node --check "$f"; then
              echo "::error file=$f::Node syntax check failed"
              fail=1
            fi
          done
          exit $fail

      - name: End-to-end test echo-agent (Python)
        run: |
          output=$(echo '{"type":"turn","message":"hello","session_id":"","from_user":"ci","protocol_version":"0.4"}' | python3 hub/echo-agent/bridge.py)
          if [ "$output" != '{"type":"result","text":"You said: hello"}' ]; then
            echo "::error::echo-agent Python output mismatch: $output"
            exit 1
          fi

      - name: End-to-end test echo-agent (Node)
        run: |
          output=$(echo '{"type":"turn","message":"hello","session_id":"","from_user":"ci","protocol_version":"0.4"}' | node hub/echo-agent/bridge.js)
          if [ "$output" != '{"type":"result","text":"You said: hello"}' ]; then
            echo "::error::echo-agent Node output mismatch: $output"
            exit 1
          fi

      - name: End-to-end test echo-agent (Bash)
        run: |
          output=$(echo '{"type":"turn","message":"hello","session_id":"","from_user":"ci","protocol_version":"0.4"}' | bash hub/echo-agent/bridge.sh)
          if [ "$output" != '{"type":"result","text":"You said: hello"}' ]; then
            echo "::error::echo-agent Bash output mismatch: $output"
            exit 1
          fi

      - name: Cross-language parity test — recursive bridge (Python)
        run: |
          pip install pytest -q
          pytest -q hub/recursive/tests/test_bridge_parity.py
      - name: Cross-language parity test — recursive bridge (Node)
        run: |
          node --test hub/recursive/tests/test_bridge_parity.js

      - name: Validate profile.yaml files
        run: |
          set -e
          pip install pyyaml -q
          python3 -c "
          import yaml, glob, sys, os
          required = ['name', 'description', 'cli', 'agentproc', 'tested', 'maintainer']
          fail = False
          for path in sorted(glob.glob('hub/*/profile.yaml')):
              with open(path) as f:
                  p = yaml.safe_load(f)
              dirname = os.path.basename(os.path.dirname(path))
              missing = [k for k in required if k not in p]
              if missing:
                  print(f'::error file={path}::missing fields: {missing}')
                  fail = True
              if p.get('name') != dirname:
                  print(f'::error file={path}::name field ({p.get(\"name\")}) != directory name ({dirname})')
                  fail = True
              if p.get('tested') not in ('official', 'community', 'unverified'):
                  print(f'::error file={path}::tested must be official/community/unverified, got {p.get(\"tested\")!r}')
                  fail = True
              if 'command' not in (p.get('agentproc') or {}):
                  print(f'::error file={path}::agentproc.command is required')
                  fail = True
          sys.exit(1 if fail else 0)
          "
